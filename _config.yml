title: Imre Péntek
description: Notes on Linux infrastructure, storage, and security.
url: https://pentek.dev
author:
  name: Imre Péntek
  email: imre@pentek.dev

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /writing/:year/:month/:title/

# Plugins (these are GitHub Pages safelisted)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Don't include these in the build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
